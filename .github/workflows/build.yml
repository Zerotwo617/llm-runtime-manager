name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Check Rust backend
        shell: pwsh
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml 2>&1 | Tee-Object rust-check.log
          if ($LASTEXITCODE -ne 0) {
            "## Rust check failed" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            Get-Content rust-check.log -Tail 120 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit $LASTEXITCODE
          }

      - name: Build Tauri app
        run: npm run tauri:build
