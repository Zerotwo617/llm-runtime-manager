name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Check Rust backend
        id: rust-check
        continue-on-error: true
        shell: pwsh
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml 2>&1 | Tee-Object rust-check.log
          if ($LASTEXITCODE -ne 0) {
            $tail = (Get-Content rust-check.log -Tail 80) -join "`n"
            $escaped = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Rust check failed::$escaped"
            exit $LASTEXITCODE
          }

      - name: Upload Rust check log
        if: steps.rust-check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rust-check-log
          path: rust-check.log

      - name: Fail after Rust check
        if: steps.rust-check.outcome == 'failure'
        run: exit 1

      - name: Build Tauri app
        id: tauri-build
        continue-on-error: true
        shell: pwsh
        run: |
          npm run tauri:build 2>&1 | Tee-Object tauri-build.log
          if ($LASTEXITCODE -ne 0) {
            $tail = (Get-Content tauri-build.log -Tail 80) -join "`n"
            $escaped = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Tauri build failed::$escaped"
            exit $LASTEXITCODE
          }

      - name: Upload Tauri build log
        if: steps.tauri-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log
          path: tauri-build.log

      - name: Fail after Tauri build
        if: steps.tauri-build.outcome == 'failure'
        run: exit 1

      - name: Upload Windows executable
        if: steps.tauri-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: llm-runtime-manager-windows
          path: src-tauri/target/release/llm-runtime-manager.exe
